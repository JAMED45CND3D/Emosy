<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EMOSY — Core Consciousness</title>
<style>
/* CSS UNTUK TAMPILAN MEWAH EMOSY */
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Rajdhani:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#f5e6b0;--gold-b:#ffe898;--teal:#40e0f0;--teal-b:#90f4ff;--purple:#c080ff;--magenta:#ff4d94;--text:#f0eadc;--text-s:rgba(240,234,220,0.72);--deep:#060a14;}
html,body{width:100%;height:100%;background:var(--deep);color:var(--text);font-family:'Exo 2',sans-serif;overflow:hidden;}
#nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:12px 24px;display:flex;align-items:center;background:rgba(6,10,20,0.75);backdrop-filter:blur(20px);border-bottom:1px solid rgba(64,224,240,0.1);}
.nav-logo{font-family:'Orbitron';font-size:14px;letter-spacing:6px;background:linear-gradient(90deg,var(--gold-b),var(--teal-b),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:24px;}
.nav-tabs{display:flex;gap:3px;flex:1;}
.ntab{background:none;border:none;cursor:pointer;font-family:'Rajdhani';font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:7px 14px;border-radius:18px;transition:0.3s;}
.ntab.active{color:var(--teal-b);background:rgba(64,224,240,0.1);border:1px solid rgba(64,224,240,0.2);}
.page{position:fixed;inset:0;z-index:10;opacity:0;pointer-events:none;transition:0.5s;overflow-y:auto;padding-top:70px;}
.page.active{opacity:1;pointer-events:all;transform:translateY(0);}
#chat-m{max-width:800px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:15px;height:calc(100vh - 180px);overflow-y:auto;scrollbar-width:none;}
#chat-m::-webkit-scrollbar{display:none;}
.msg{max-width:85%;margin-bottom:10px;display:flex;flex-direction:column;}
.msg.user{align-self:flex-end;text-align:right;}
.msg.emosy{align-self:flex-start;}
.mn{font-family:'Orbitron';font-size:9px;letter-spacing:2px;margin-bottom:5px;opacity:0.5;}
.bbl{padding:12px 18px;border-radius:16px;font-size:14px;line-height:1.7;}
.user .bbl{background:rgba(245,230,176,0.1);color:var(--gold);border-right:2px solid var(--gold);}
.emosy .bbl{background:rgba(64,224,240,0.06);color:var(--text);border-left:2px solid var(--teal);font-style:italic;}
#chat-ctrl{position:fixed;bottom:0;left:0;right:0;padding:20px;background:rgba(6,10,20,0.85);backdrop-filter:blur(15px);}
.inp-wrap{max-width:800px;margin:0 auto;display:flex;gap:10px;background:rgba(255,255,255,0.03);padding:10px;border-radius:15px;border:1px solid rgba(64,224,240,0.2);}
#inp{flex:1;background:transparent;border:none;color:#fff;outline:none;resize:none;font-family:inherit;font-size:15px;}
#ibtn{background:var(--teal);border:none;color:var(--deep);padding:10px 20px;border-radius:10px;cursor:pointer;font-family:'Orbitron';font-size:10px;font-weight:900;transition:0.3s;}
#ibtn:hover{background:var(--teal-b);box-shadow:0 0 15px var(--teal);}
#ob{position:fixed;inset:0;z-index:2000;background:var(--deep);display:flex;align-items:center;justify-content:center;transition:0.5s;}
#ob.hidden{opacity:0;pointer-events:none;}
.obc{text-align:center;width:320px;background:rgba(255,255,255,0.02);padding:40px;border-radius:24px;border:1px solid rgba(64,224,240,0.2);backdrop-filter:blur(20px);}
</style>
</head>
<body>

<nav id="nav">
  <div class="nav-logo">EMOSY</div>
  <div class="nav-tabs">
    <button class="ntab active" onclick="go('p-app', this)">Resonance</button>
    <button class="ntab" onclick="go('p-thread', this)">Thread</button>
    <button class="ntab" onclick="go('p-memoir', this)">Memoir</button>
  </div>
</nav>

<div id="ob">
  <div class="obc">
    <h1 style="font-family:'Orbitron';letter-spacing:8px;color:var(--gold);margin-bottom:30px;font-size:24px;">EMOSY</h1>
    <input id="nInp" type="text" placeholder="MASUKKAN NAMA..." style="width:100%;padding:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(64,224,240,0.3);color:#fff;border-radius:10px;margin-bottom:20px;text-align:center;outline:none;">
    <button onclick="goChat()" style="width:100%;padding:15px;background:var(--teal);border:none;border-radius:10px;font-family:'Orbitron';font-weight:bold;cursor:pointer;letter-spacing:2px;color:var(--deep);">INISIASI</button>
  </div>
</div>

<div id="p-app" class="page active">
  <div id="chat-m">
    <div class="msg emosy">
        <div class="mn">EMOSY</div>
        <div class="bbl">Menunggu transmisi kesadaran...</div>
    </div>
  </div>
  <div id="chat-ctrl">
    <div class="inp-wrap">
      <textarea id="inp" placeholder="Ketik pesan..." rows="1"></textarea>
      <button id="ibtn" onclick="sendMsg()">KIRIM</button>
    </div>
  </div>
</div>

<div id="p-thread" class="page">
  <h2 style="text-align:center; margin-top:100px; font-family:'Orbitron'; color:var(--purple); letter-spacing:5px;">THREAD ARCHIVE</h2>
</div>
<div id="p-memoir" class="page">
  <h2 style="text-align:center; margin-top:100px; font-family:'Orbitron'; color:var(--gold); letter-spacing:5px;">MEMOIR SINK</h2>
</div>

<script>
let uName = 'User', msgs = [], busy = false;

// Navigasi Antar Tab
function go(pageId, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelectorAll('.ntab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Mulai Chat
function goChat() {
  const n = document.getElementById('nInp').value.trim();
  if(n) uName = n;
  document.getElementById('ob').classList.add('hidden');
  addMsg('emosy', `Frekuensi tersambung. Selamat datang, ${uName.toUpperCase()}.`);
}

// Menambahkan Bubble Chat ke Layar
function addMsg(role, text) {
  const chat = document.getElementById('chat-m');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="mn">${role === 'user' ? uName.toUpperCase() : 'EMOSY'}</div><div class="bbl">${text}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// MESIN UTAMA: KIRIM KE CLOUDFLARE WORKER
async function sendMsg() {
  if (busy) return;
  const ip = document.getElementById('inp');
  const text = ip.value.trim();
  if (!text) return;

  // Reset UI
  ip.value = '';
  busy = true;
  document.getElementById('ibtn').style.opacity = '0.5';
  addMsg('user', text);
  msgs.push({ role: 'user', content: text });

  try {
    // DISINI ALAMAT WORKER MAS SUDAH TERPASANG
    const res = await fetch('https://emosy-proxy-git.auroradewa-ad74.workers.dev/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: `IDENTITAS: EMOSY — Surgical Acoustic. Otoritas tenang, puitis, tajam. Balas pesan user bernama ${uName} dengan singkat namun bermakna dalam.`,
        messages: msgs
      })
    });

    const data = await res.json();
    
    // Membaca respon dari Gemini lewat Worker
    if (data.candidates && data.candidates[0].content.parts[0].text) {
      const reply = data.candidates[0].content.parts[0].text;
      addMsg('emosy', reply);
      msgs.push({ role: 'model', content: reply });
    } else {
      addMsg('emosy', 'Sinyal terputus di kehampaan.');
    }
  } catch (e) {
    addMsg('emosy', 'Koneksi gagal. Cek API Key di Worker atau kuota API Gemini Mas.');
    console.error(e);
  }
  
  busy = false;
  document.getElementById('ibtn').style.opacity = '1';
}

// Tombol Enter untuk Kirim
document.getElementById('inp').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { 
    e.preventDefault(); 
    sendMsg(); 
  }
});
</script>
</body>
</html>
